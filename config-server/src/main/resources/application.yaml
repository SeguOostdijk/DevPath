server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/SeguOostdijk/DevPath
          default-label: main
          search-paths: configurations
eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
