services:

  # ── Base de datos ───────────────────────────────────────────────────────────

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: auth_db
    volumes:
      - mysql-auth-data:/var/lib/mysql
    networks:
      - devpath-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-course:
    image: mysql:8.0
    container_name: mysql-course
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: course_db
    volumes:
      - mysql-course-data:/var/lib/mysql
    networks:
      - devpath-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Infraestructura ─────────────────────────────────────────────────────────

  eureka-server:
    build:
      context: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - devpath-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  config-server:
    build:
      context: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      # Config Server necesita estas vars para resolver los ${} en los .yml que sirve
      JWT_SECRET: ${JWT_SECRET}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - devpath-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health 2>/dev/null | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ── Microservicios ──────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - devpath-network

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql-auth:
        condition: service_healthy
    networks:
      - devpath-network

  course-service:
    build:
      context: ./course-service
    container_name: course-service
    ports:
      - "8082:8082"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      mysql-course:
        condition: service_healthy
    networks:
      - devpath-network

# ── Volúmenes y redes ────────────────────────────────────────────────────────

volumes:
  mysql-auth-data:
  mysql-course-data:

networks:
  devpath-network:
    driver: bridge
